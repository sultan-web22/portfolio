<form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
  
  <div class="form-group">
    <label>Name</label>
    <input formControlName="name" type="text" placeholder="Your Name">
    <small *ngIf="contactForm.get('name')?.invalid && contactForm.get('name')?.touched">
      Name is required (min 2 characters).
    </small>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input formControlName="email" type="email" placeholder="Your Email">
    <small *ngIf="contactForm.get('email')?.invalid && contactForm.get('email')?.touched">
      Please enter a valid email.
    </small>
  </div>

  <div class="form-group">
    <label>Message</label>
    <textarea formControlName="message" placeholder="How can I help you?"></textarea>
  </div>

  <button type="submit" [disabled]="contactForm.invalid">Send Message</button>
</form>
