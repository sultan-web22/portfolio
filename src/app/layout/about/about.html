
<div class="about-container">

  <section *ngIf="myskills" class="skills-section">

    <h2>Technical Skills</h2>

    <div class="skills-grid">

      <span *ngFor="let skill of myskills.skills" class="skill-pill">{{ skill }}</span>

    </div>

  </section> <section *ngIf="education" class="education-section">

  <h2>Education</h2>

  <div *ngFor="let edu of education" class="edu-card">

    <h3>{{ edu.degree }}</h3>

    <p>{{ edu.institution }} | {{ edu.year }}</p>

  </div>

</section>
