<div class="dashboard-container">
  <h2>Inbound Messages</h2>
  
  <div *ngFor="let msg of messages" class="message-card" [class.read]="msg.read">
    <div class="msg-header">
      <strong>{{ msg.name }}</strong> ({{ msg.email }})
    </div>
    <p>{{ msg.message }}</p>
    
    <!-- Only show button if message is not read -->
    <button *ngIf="!msg.read" 
            (click)="markAsRead(msg._id)" 
            class="btn-read">
      Mark as Read
    </button>
    
    <span *ngIf="msg.read" class="status-badge">Read</span>
  </div>
</div>
