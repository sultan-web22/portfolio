<div class="form-container">
  <h2>{{ isEditMode ? 'Edit Project' : 'Add New Project' }}</h2>

  <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Project Title:</label>
      <input type="text" formControlName="title" class="form-control">
    </div>

    <div class="form-group">
      <label>Description:</label>
      <textarea formControlName="description" class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label>My Role:</label>
      <input type="text" formControlName="myrole" class="form-control">
    </div>

    <div class="form-group">
      <label>Image URL:</label>
      <input type="text" formControlName="imageURL" class="form-control">
    </div>

    <div class="form-group">
      <label>Project Link:</label>
      <input type="text" formControlName="projectLink" class="form-control">
    </div>

    <div class="button-group">
      <button type="submit" [disabled]="projectForm.invalid" class="btn-save">
        {{ isEditMode ? 'Update Project' : 'Create Project' }}
      </button>

      <!-- Delete button only shows in Edit Mode -->
      <button *ngIf="isEditMode" type="button" (click)="onDelete()" class="btn-delete">
        Delete Project
      </button>
      
      <button type="button" (click)="this.router.navigate(['/dashboard/project'])" class="btn-cancel">
        Cancel
      </button>
    </div>
  </form>
</div>
