<div class="services-container">
  <h2>Our Services</h2>
  <div class="services-grid">
    <div *ngFor="let service of services" class="service-card">
      <h3>{{ service.type }}</h3>
      <p><strong>Available from:</strong> 
         {{ service.avalibilitydate | date:'mediumDate' }}
      </p>
    </div>
  </div>
</div>
