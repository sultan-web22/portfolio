
<div class="about-container">

  <section *ngIf="skills" class="skills-section">

    <h2>Technical Skills</h2>

    <div class="skills-grid">

      <span *ngFor="let skill of skills.skills" class="skill-pill">{{ skill }}</span>

    </div>

  </section> <section *ngIf="education" class="education-section">

  <h2>Education</h2>

  <div class="edu-card">

    <h3>{{ education.degree }}</h3>

    <p>{{ education.institution }} | {{ education.year }}</p>

  </div>

</section>
