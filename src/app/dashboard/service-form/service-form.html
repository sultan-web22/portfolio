<div class="form-container">
  <h2>{{ isEditMode ? 'Edit Service' : 'Add New Service' }}</h2>

  <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Service Type:</label>
      <input type="text" formControlName="type" class="form-control">
    </div>

    <div class="form-group">
      <label>Availability Date:</label>
      <input type="date" formControlName="availabilitydate" class="form-control">
    </div>

    <div class="button-group">
      <button type="submit" [disabled]="serviceForm.invalid" class="btn-save">
        {{ isEditMode ? 'Update Service' : 'Save Service' }}
      </button>
      
      <button type="button" (click)="this.router.navigate(['/dashboard/services'])" class="btn-cancel">
        Cancel
      </button>
    </div>
  </form>
</div>
